<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - MyWeb's Personal Website</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Menu -->
    <header>
        <nav>
            <a href="../index.html" class="logo">MyWeb</a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="index.html" class="active">Blog</a></li>
                <li><a href="../projects/index.html">Projects</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <section class="blog-section">
            <h2 class="section-title">My Blog</h2>

            <div class="blog-list">
                <a class="blog-item" href="article1.html">
                    <h3>log</h3>
                    <p class="blog-date">2026-02-07</p>
                    <p class="blog-description">My website logs</p>
                </a>
                <a class="blog-item" href="article2.html">
                    <h3>My Bookmarked Websites</h3>
                    <p class="blog-date">2026-02-10</p>
                    <p class="blog-description">my bookmarks and saved websites</p>
                </a>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 MyWeb's Personal Website. All rights reserved.</p>
        <p>Built with HTML5 and CSS3 | Hosted on GitHub Pages</p>
    </footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        const links = navLinks.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
