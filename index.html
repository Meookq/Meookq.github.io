<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb - Personal Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Menu -->
    <header>
        <nav>
            <a href="index.html" class="logo">MyWeb</a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/" class="active">Home</a></li>
                <li><a href="about/index.html">About</a></li>
                <li><a href="blog/index.html">Blog</a></li>
                <li><a href="projects/index.html">Projects</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1>Welcome to MyWeb</h1>
        </section>

        <!-- 爱好部分（已移至 About 页面） -->

        <!-- Quick Links -->
        <section style="text-align: center; margin: 3rem 0; padding: 2rem; background: white; border-radius: 8px;">
            <h2 style="color: #2563eb; margin-bottom: 1rem;">Quick Navigation</h2>
            <p style="margin-bottom: 1rem; color: #666;">Browse my blog, learn more about me, or check out my projects</p>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="/blog/index.html" style="display: inline-block; background-color: #2563eb; color: white; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; transition: background-color 0.3s;">📝 Read Blog</a>
                <a href="/about/index.html" style="display: inline-block; background-color: #64748b; color: white; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; transition: background-color 0.3s;">👤 About Me</a>
                <a href="/projects/index.html" style="display: inline-block; background-color: #8b5cf6; color: white; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; transition: background-color 0.3s;">🚀 My Projects</a>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 MyWeb's Personal Website. All rights reserved.</p>
        <p>Built with HTML5 and CSS3 | Hosted on GitHub Pages</p>
    </footer>

    <script>
        // 导航菜单切换
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // 链接点击时关闭菜单
        const links = navLinks.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
            });
        });

        // 设置活跃链接
        window.addEventListener('load', () => {
            const currentLocation = location.pathname;
            links.forEach(link => {
                let href = link.getAttribute('href');
                if (currentLocation === '/' || currentLocation === '/index.html') {
                    if (href === '/' || href === '/index.html') {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                } else {
                    if (currentLocation.includes(href) && href !== '/') {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                }
            });
        });
    </script>
</body>
</html>
